# ########################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
#hyprctl monitors all
#monitor=name,res@hz,offset,scaling
monitor=eDP-1,preferred,auto,1
#monitor=DP-2,1366x768@60,auto,1 #for TV connection

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = alacritty
$fileManager = pcmanfm-qt
$menu = wofi --show drun --gtk-dark

# Some default env vars.
env = XCURSOR_SIZE,20
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that

#launch waybar with hyperland
exec-once=waybar & gammastep -l 34:-111 -t 4000:3300 & swww init; swww img -t none ~/Pictures/Wallpaper/swww6.* & /usr/lib/polkit-kde-authentication-agent-1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0.0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(ff0000ff) rgba(0000ffff) 45deg
    col.inactive_border = rgba(595959ff)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    
    blur {
        enabled = false #true
        size = 3
        passes = 1
    }

    drop_shadow = no #yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = no # yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    no_gaps_when_only = 1
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
   workspace_swipe = off
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    vfr = true
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device {
    name = elan06fa:00-04f3:31e6-touchpad
    sensitivity = 0.0
}
device {
    name = logitech-wireless-mouse
    sensitivity = 1.0
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, wofi --show run --gtk-dark 
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod SHIFT, A, pin, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#USER ADDED BINDS
# Screen brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Volume and Media Control
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5 
bind = , XF86AudioLowerVolume, exec, pamixer -d 5 
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

#For printscreening
bind = ,Print, exec, hyprshot-gui 

#For Sharescreening
windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$

#runs user made scripts
#show and hide waybar
bind = $mainMod SHIFT, W, exec, if pidof waybar; then killall -9 waybar; else exec waybar; fi

#runs brave
bind = $mainMod, W, exec, brave

#change wallpapers
bind = ALT, 1, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww1.*; fi
bind = ALT, 3, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww2.*; fi
bind = ALT, 2, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww3.*; fi
bind = ALT, 4, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww4.*; fi
bind = ALT, 5, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww5.*; fi
bind = ALT, 6, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww6.*; fi
bind = ALT, 7, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww7.*; fi
bind = ALT, 8, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww8.*; fi
bind = ALT, 9, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww9.*; fi
bind = ALT, 0, exec, if pidof swww-daemon; then swww img -t none ~/Pictures/Wallpaper/swww.*; exec swww kill; else swww init; swww img -t none ~/Pictures/Wallpaper/swww0.*; fi
bind = $mainMod, M, exec, swww img ~/Pictures/Wallpaper/swww.*; exec swww kill

#animations
bind =  $mainMod, a, exec, hyper=$(hyprctl getoption animations:enabled); if [[ $hyper == *"int: 1"* ]]; then hyprctl keyword animations:enabled off; else hyprctl keyword animations:enabled on; fi

#keybind to change window styles
bind = $mainMod, d, exec, hyper=$(hyprctl getoption decoration:rounding); if [[ $hyper == *"int: 0"* ]]; then hyprctl keyword decoration:rounding 5 & hyprctl keyword general:border_size 5 & hyprctl keyword general:gaps_in 5 & hyprctl keyword general:gaps_out 10; else hyprctl keyword decoration:rounding 0; hyprctl keyword general:border_size 2; hyprctl keyword general:gaps_in 0; hyprctl keyword general:gaps_out 0; fi

bind = $mainMod, f, exec, hyprctl dispatch fullscreen 1
bind = $mainMod SHIFT, F, exec, hyprctl dispatch fullscreen 0

# Move window with mainMod + arrow keys
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d


#bindl=,switch:on:"Lid Switch",exec,hyprctl keyword monitor "eDP-1, preferred, auto, 1"
#bindl=,switch:off:"Lid Switch",exec,hyprctl keyword monitor "eDP-1, preferred, auto, 1"